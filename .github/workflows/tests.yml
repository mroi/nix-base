# run rebuild tests on Ubuntu and macOS
name: Rebuild Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    strategy:
      matrix:
        machine: [jupiter, thyone]
        include:
        - machine: jupiter
          os: macos-latest
        - machine: thyone
          os: ubuntu-latest
    name: Rebuild ${{ matrix.machine }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      HOSTNAME: ${{ matrix.machine }}
      NIX_CONFIG: access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run rebuild
      run: ./rebuild

    - name: Rerun rebuild
      run: |
        ! ./rebuild | grep .
        test ${PIPESTATUS[0]} -eq 0 -a ${PIPESTATUS[1]} -ne 0

    - name: Check flake
      run: |
        # reset to default Nix configuration without remote builders
        sudo rm /nix/nix.conf
        . modules/system/utils.sh
        . modules/system/state.sh
        . modules/nix/install.sh
        ~/.local/state/nix/profile/bin/nix flake check
